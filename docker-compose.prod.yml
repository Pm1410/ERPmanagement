version: "3.9"

networks:
  erp-prod:
    driver: bridge

volumes:
  pgdata-prod:
  redisdata-prod:

services:

  postgres:
    image: postgres:15-alpine
    container_name: erp_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-school_erp}
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - erp-prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-erp_user}"]
      interval: 15s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      --save 900 1
      --save 300 10
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redisdata-prod:/data
    networks:
      - erp-prod
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: erp_api
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-school_erp}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - erp-prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://example.com/api}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL:-https://example.com}
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-School ERP}
    container_name: erp_web
    restart: always
    env_file: .env.prod
    environment:
      NODE_ENV: production
    networks:
      - erp-prod
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - api
      - web
    networks:
      - erp-prod
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"
