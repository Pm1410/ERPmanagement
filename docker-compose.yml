version: "3.9"

# ── Networks ───────────────────────────────────────────────────────────────────
networks:
  erp-net:
    driver: bridge

# ── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  pgdata:
  redisdata:
  miniodata:

services:

  # ── PostgreSQL ──────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: school_erp
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - erp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d school_erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: erp_redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (local email dev server) ────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: erp_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - erp-net

  # ── MinIO (local S3-compatible file storage) ─────────────────
  minio:
    image: minio/minio:latest
    container_name: erp_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - miniodata:/data
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO bucket init ────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: erp_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb --ignore-existing local/school-erp-uploads;
        mc anonymous set download local/school-erp-uploads/public;
        echo 'MinIO bucket ready';
      "
    networks:
      - erp-net

  # ── NestJS API ───────────────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile.dev
    container_name: erp_api
    restart: unless-stopped
    env_file:
      - ./apps/api/.env
    environment:
      DATABASE_URL: postgresql://erp_user:erp_pass@postgres:5432/school_erp
      REDIS_URL: redis://redis:6379
      MAILHOG_HOST: mailhog
      MAILHOG_PORT: "1025"
      AWS_ENDPOINT: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET_NAME: school-erp-uploads
      NODE_ENV: development
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - erp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Next.js Web ───────────────────────────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.dev
    container_name: erp_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost/api
      NEXT_PUBLIC_SOCKET_URL: http://localhost
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api
    networks:
      - erp-net

  # ── Nginx reverse proxy ──────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: erp_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    networks:
      - erp-net

  # ── Bull Board standalone (queue monitoring) ─────────────────
  bull-board:
    image: node:20-alpine
    container_name: erp_bull_board
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "npm install -g @bull-board/cli 2>/dev/null || true &&
             npx bull-board --redis-host redis --redis-port 6379 --port 3002"
    ports:
      - "3002:3002"
    depends_on:
      - redis
    networks:
      - erp-net

  # ── Adminer (lightweight DB UI) ──────────────────────────────
  adminer:
    image: adminer:latest
    container_name: erp_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      - postgres
    networks:
      - erp-net
